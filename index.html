    {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230a0a0f'/%3E%3Ctext y='360' x='60' font-size='320'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230a0a0f'/%3E%3Ctext y='125' x='20' font-size='110'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">

<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
  --border:rgba(255,255,255,0.07);
  --accent:#6ee7f7; --accent2:#a78bfa; --accent3:#f472b6; --accent4:#34d399;
  --text:#e8e8f0; --text-dim:#7070a0; --text-dimmer:#404060;
  --radius:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(110,231,247,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 60% at 80% 80%,rgba(167,139,250,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;animation:bgPulse 12s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{transform:scale(1)}100%{transform:scale(1.05)}}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  padding:calc(var(--safe-top) + 14px) 20px 0;
  background:rgba(10,10,15,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.header-top{display:flex;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto;padding-bottom:14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;box-shadow:0 0 20px rgba(110,231,247,.3);
}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.logo-text span{color:var(--accent)}
.live-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(110,231,247,.1);border:1px solid rgba(110,231,247,.2);
  border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;color:var(--accent);
}
.live-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 8px var(--accent)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* CATEGORIE */
.cat-bar{
  display:flex;gap:6px;overflow-x:auto;padding:10px 20px;
  max-width:480px;margin:0 auto;scrollbar-width:none;
}
.cat-bar::-webkit-scrollbar{display:none}
.cat-chip{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.cat-chip.active{border-color:rgba(110,231,247,.35);color:var(--accent);background:rgba(110,231,247,.1)}

/* FEED CHIPS */
.feed-bar{
  display:flex;gap:5px;overflow-x:auto;padding:0 20px 12px;
  max-width:480px;margin:0 auto;scrollbar-width:none;
}
.feed-bar::-webkit-scrollbar{display:none}
.feed-chip{
  flex-shrink:0;padding:5px 11px;border-radius:14px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dimmer);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.feed-chip.active{border-color:rgba(167,139,250,.4);color:var(--accent2);background:rgba(167,139,250,.08)}

/* MAIN */
.main{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px 16px calc(var(--safe-bottom) + 80px)}

/* STATS */
.stats-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-pill{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:5px 11px;font-size:11px;color:var(--text-dim);
}
.stat-pill span{color:var(--text);font-weight:600}

/* REFRESH BAR */
.refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.btn-refresh{
  display:flex;align-items:center;gap:5px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:6px 11px;color:var(--text-dim);
  font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;
}
.btn-refresh:active{transform:scale(.95)}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARDS */
.news-list{display:flex;flex-direction:column;gap:10px}
.news-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  transition:all .25s;position:relative;overflow:hidden;
  animation:slideIn .4s ease both;
}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.news-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s}
.news-card.sci::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.news-card.div::before{background:linear-gradient(90deg,var(--accent2),var(--accent3))}
.news-card.pra::before{background:linear-gradient(90deg,var(--accent4),var(--accent))}
.news-card.ita::before{background:linear-gradient(90deg,#22c55e,var(--accent4))}
.news-card:active{transform:scale(.98)}
.news-card:active::before{opacity:1}

.news-source{display:flex;align-items:center;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.source-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sci .source-dot{background:var(--accent)}
.div .source-dot{background:var(--accent2)}
.pra .source-dot{background:var(--accent4)}
.ita .source-dot{background:#22c55e}
.source-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.sci .source-name{color:var(--accent)}
.div .source-name{color:var(--accent2)}
.pra .source-name{color:var(--accent4)}
.ita .source-name{color:#22c55e}
.news-time{font-size:10px;color:var(--text-dimmer);margin-left:auto}
.cat-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600;letter-spacing:.5px}
.sci .cat-badge{background:rgba(110,231,247,.12);color:var(--accent)}
.div .cat-badge{background:rgba(167,139,250,.12);color:var(--accent2)}
.pra .cat-badge{background:rgba(52,211,153,.12);color:var(--accent4)}
.ita .cat-badge{background:rgba(34,197,94,.12);color:#22c55e}

.news-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;line-height:1.35;margin-bottom:7px}
.news-title-en{font-size:11px;color:var(--text-dimmer);font-style:italic;margin-bottom:9px;line-height:1.4}
.news-desc{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:12px}
.news-footer{display:flex;align-items:center;justify-content:space-between}
.badge{font-size:10px;color:var(--text-dimmer)}
.btn-read{
  display:flex;align-items:center;gap:4px;
  background:rgba(110,231,247,.1);border:1px solid rgba(110,231,247,.2);
  border-radius:8px;padding:5px 11px;color:var(--accent);
  font-size:11px;font-weight:500;text-decoration:none;
}

/* SKELETON */
.skeleton-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:flex;flex-direction:column;gap:9px;animation:slideIn .4s ease both;
}
.sk{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ERROR / EMPTY */
.error-box{
  background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.2);
  border-radius:var(--radius);padding:24px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.error-title{font-family:'Syne',sans-serif;font-weight:700;color:var(--accent3);font-size:15px}
.error-msg{font-size:13px;color:var(--text-dim);line-height:1.5}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;padding:12px 24px;
  color:#0a0a0f;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;
}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.6}

/* FAB */
.fab{
  position:fixed;bottom:calc(var(--safe-bottom) + 24px);right:20px;z-index:50;
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
  box-shadow:0 4px 20px rgba(110,231,247,.3);transition:all .2s;color:#0a0a0f;font-weight:700;
}
.fab:active{transform:scale(.9)}

/* PWA BANNER */
.pwa-banner{
  position:fixed;bottom:calc(var(--safe-bottom) + 80px);left:50%;
  transform:translateX(-50%);z-index:60;
  background:var(--surface2);border:1px solid rgba(110,231,247,.25);
  border-radius:14px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  max-width:320px;width:calc(100% - 32px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:slideUp .4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pwa-banner.hidden{display:none}
.pwa-banner-text{flex:1;font-size:12px;color:var(--text-dim);line-height:1.5}
.pwa-banner-text strong{color:var(--text);display:block;margin-bottom:2px}
.pwa-banner-close{color:var(--text-dimmer);font-size:18px;cursor:pointer;padding:4px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">&#9889;</div>
      <div class="logo-text">AI News <span>ITA</span></div>
    </div>

  </div>
  <div class="cat-bar" id="catBar">
    <div class="cat-chip active" onclick="selectCat(0)">&#127760; Tutto</div>
    <div class="cat-chip" onclick="selectCat(1)">&#128300; Scientifico</div>
    <div class="cat-chip" onclick="selectCat(2)">&#128240; Divulgativo</div>

  </div>
  <div class="feed-bar" id="feedBar"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="stats-bar" id="statsBar" style="display:none">

</div>

<div class="fab" onclick="loadNews()">&#8635;</div>

<div class="pwa-banner hidden" id="pwaBanner">

    <strong>Aggiungi alla Home Screen</strong>
    Safari &rarr; Condividi &rarr; Aggiungi a Home
  </div>
  <span class="pwa-banner-close" onclick="dismissBanner()">&#10005;</span>
</div>

<script>
// ── FEED DATABASE ─────────────────────────────────────────────────────────
const ALL_FEEDS = [
  // SCIENTIFICO
  { id:0,  label:'arXiv AI',        emoji:'🔬', rss:'https://arxiv.org/rss/cs.AI',                                             type:'sci', lang:'en' },
  { id:1,  label:'MIT Tech Review', emoji:'🧠', rss:'https://www.technologyreview.com/feed/',                                  type:'sci', lang:'en' },
  { id:2,  label:'DeepMind',        emoji:'🤖', rss:'https://deepmind.google/blog/rss.xml',                                    type:'sci', lang:'en' },
  { id:3,  label:'OpenAI Blog',     emoji:'💡', rss:'https://openai.com/news/rss.xml',                                         type:'sci', lang:'en' },
  // DIVULGATIVO
  { id:4,  label:'VentureBeat AI',  emoji:'📡', rss:'https://venturebeat.com/category/ai/feed/',                               type:'div', lang:'en' },
  { id:5,  label:'The Verge AI',    emoji:'🚀', rss:'https://www.theverge.com/rss/ai-artificial-intelligence/index.xml',       type:'div', lang:'en' },
  { id:6,  label:'TechCrunch AI',   emoji:'🟢', rss:'https://techcrunch.com/category/artificial-intelligence/feed/',          type:'div', lang:'en' },
  { id:7,  label:'Mashable',        emoji:'📲', rss:'https://mashable.com/feeds/rss/all',                                      type:'div', lang:'en' },
  { id:8,  label:'ZDNet AI',        emoji:'📊', rss:'https://www.zdnet.com/topic/artificial-intelligence/rss.xml',             type:'div', lang:'en' },
  // PRATICO
  { id:9,  label:'Hacker News',     emoji:'💻', rss:'https://news.ycombinator.com/rss',                                       type:'pra', lang:'en' },
  { id:10, label:'How-To Geek',     emoji:'🔧', rss:'https://www.howtogeek.com/feed/',                                        type:'pra', lang:'en' },
  { id:11, label:'Lifehacker',      emoji:'⚡', rss:'https://lifehacker.com/feed/rss',                                         type:'pra', lang:'en' },
  { id:12, label:"Tom's Hardware",  emoji:'🖥️', rss:'https://www.tomshardware.com/feeds/all',                                  type:'pra', lang:'en' },
  // ITALIANO
  { id:13, label:'Wired Italia',    emoji:'🇮🇹', rss:'https://www.wired.it/feed/rss',                                          type:'ita', lang:'it' },
  { id:14, label:"Tom's HW ITA",    emoji:'🇮🇹', rss:'https://www.tomshw.it/feed',                                             type:'ita', lang:'it' },
  { id:15, label:'HTML.it',         emoji:'🇮🇹', rss:'https://www.html.it/feed/',                                              type:'ita', lang:'it' },
];

const CATEGORIES = [
  { label:'Tutte le fonti',  types:['sci','div','pra','ita'] },
  { label:'Scientifico',     types:['sci'] },
  { label:'Divulgativo',     types:['div'] },
  { label:'Pratico',         types:['pra'] },
  { label:'In italiano',     types:['ita'] },
];

let curCat=0, curFeedId=-1, loading=false;

// ── INIT ──────────────────────────────────────────────────────────────────
function init(){
  renderFeedBar();
  loadNews();
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS&&!window.navigator.standalone&&!localStorage.getItem('pwaBannerDismissed')){
    setTimeout(()=>show('pwaBanner'),4000);
  }
}
function dismissBanner(){ hide('pwaBanner'); localStorage.setItem('pwaBannerDismissed','1'); }

// ── NAVIGAZIONE ───────────────────────────────────────────────────────────
function selectCat(i){
  curCat=i; curFeedId=-1;
  document.querySelectorAll('.cat-chip').forEach((c,j)=>c.classList.toggle('active',i===j));
  document.getElementById('sectionTitle').textContent=CATEGORIES[i].label;
  renderFeedBar(); loadNews();
}
function selectFeed(id){
  curFeedId=(curFeedId===id)?-1:id;
  renderFeedBar(); loadNews();
}
function renderFeedBar(){
  const types=CATEGORIES[curCat].types;
  const feeds=ALL_FEEDS.filter(f=>types.includes(f.type));
  const bar=document.getElementById('feedBar');
  if(feeds.length<=1){bar.innerHTML='';return;}
  bar.innerHTML=feeds.map(f=>`
    <div class="feed-chip ${curFeedId===f.id?'active':''}" onclick="selectFeed(${f.id})">
      ${f.emoji} ${f.label}
    </div>`).join('');
}
function activeFeedsToLoad(){
  const types=CATEGORIES[curCat].types;
  if(curFeedId>=0) return ALL_FEEDS.filter(f=>f.id===curFeedId);
  return ALL_FEEDS.filter(f=>types.includes(f.type));
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function strip(s){return(s||'').replace(/<[^>]*>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').trim()}
function ago(d){
  try{
    const m=Math.floor((Date.now()-new Date(d))/60000);
    if(m<1)return'adesso';if(m<60)return m+'m fa';
    const h=Math.floor(m/60);if(h<24)return h+'h fa';
    return Math.floor(h/24)+'g fa';
  }catch{return''}
}

// ── SKELETON ──────────────────────────────────────────────────────────────
function skels(n=6){
  document.getElementById('newsList').innerHTML=Array(n).fill(0).map((_,i)=>`
    <div class="skeleton-card" style="animation-delay:${i*70}ms">
      <div style="display:flex;gap:8px">
        <div class="sk" style="height:9px;width:70px"></div>
        <div class="sk" style="height:9px;width:45px;margin-left:auto"></div>
      </div>
      <div class="sk" style="height:15px;width:100%"></div>
      <div class="sk" style="height:15px;width:72%"></div>
      <div class="sk" style="height:11px;width:100%;margin-top:3px"></div>
      <div class="sk" style="height:11px;width:80%"></div>
    </div>`).join('');
}

// ── RSS FETCH ─────────────────────────────────────────────────────────────
async function fetchRSS(url){
  try{
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=8`);
    if(r.ok){const d=await r.json();if(d.status==='ok'&&d.items?.length)return d.items;}
  }catch(e){}
  try{
    const r2=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    if(!r2.ok)return[];
    const d2=await r2.json();
    const doc=new DOMParser().parseFromString(d2.contents,'text/xml');
    const nodes=Array.from(doc.querySelectorAll('item')).slice(0,8);
    return nodes.map(n=>({
      title:n.querySelector('title')?.textContent||'',
      description:n.querySelector('description')?.textContent||'',
      link:n.querySelector('link')?.textContent||'',
      pubDate:n.querySelector('pubDate')?.textContent||''
    }));
  }catch(e){return[];}
}

// ── TRANSLATE (MyMemory - gratuito, no CORS) ──────────────────────────────
async function translateText(text){
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,500))}&langpair=en|it`);
    const d=await r.json();
    if(d.responseStatus===200)return d.responseData.translatedText;
  }catch(e){}
  return null;
}
async function translateItem(item){
  const [titolo,descrizione]=await Promise.all([
    translateText(item.title),
    translateText(strip(item.description).slice(0,400))
  ]);
  return{titolo,descrizione};
}

// ── LOAD NEWS ─────────────────────────────────────────────────────────────
async function loadNews(){
  if(loading)return;
  loading=true;
  const ri=document.getElementById('ri');
  ri.className='spin';ri.textContent='↻';
  const feeds=activeFeedsToLoad();
  skels(Math.min(feeds.length*3,8));

  try{
    // Fetch tutti i feed in parallelo
    const fetchResults=await Promise.all(
      feeds.map(async f=>{
        const items=await fetchRSS(f.rss);
        return items.map(it=>({...it,_feed:f}));
      })
    );

    // Unisci, ordina per data e limita
    let allItems=fetchResults.flat();
    allItems.sort((a,b)=>{try{return new Date(b.pubDate)-new Date(a.pubDate);}catch{return 0;}});
    allItems=allItems.slice(0,30);

    if(allItems.length===0){
      document.getElementById('newsList').innerHTML=`
        <div class="empty-state">
          <div class="icon">😶</div>
          <p>Nessun articolo trovato per questa selezione.<br>Riprova o cambia categoria.</p>
        </div>`;
      loading=false;ri.className='';ri.textContent='↻';return;
    }

    // Traduci articoli in inglese a gruppi di 5
    const toTranslate=allItems.filter(it=>it._feed.lang==='en');
    const translations=new Map();
    const chunkSize=5;
    for(let i=0;i<toTranslate.length;i+=chunkSize){
      const chunk=toTranslate.slice(i,i+chunkSize);
      const trs=await Promise.all(chunk.map(it=>translateItem(it)));
      chunk.forEach((it,j)=>translations.set(it,trs[j]));
    }

    // Stats
    document.getElementById('statsBar').style.display='flex';
    document.getElementById('statCount').textContent=allItems.length;
    document.getElementById('statTime').textContent=
      new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

    // Render cards
    const catLabels={sci:'Scientifico',div:'Divulgativo',pra:'Pratico',ita:'Italiano'};
    const list=document.getElementById('newsList');
    list.innerHTML='';
    allItems.forEach((it,i)=>{
      const feed=it._feed;
      const tr=translations.get(it);
      const title=tr?.titolo||it.title;
      const desc=tr?.descrizione||strip(it.description).slice(0,200);
      const isIT=feed.lang==='it';
      const el=document.createElement('div');
      el.className=`news-card ${feed.type}`;
      el.style.animationDelay=`${Math.min(i,15)*45}ms`;
      el.innerHTML=`
        <div class="news-source">
          <div class="source-dot"></div>
          <div class="source-name">${esc(feed.emoji)} ${esc(feed.label)}</div>
          <span class="cat-badge">${catLabels[feed.type]}</span>
          <div class="news-time">${ago(it.pubDate)}</div>
        </div>
        <div class="news-title">${esc(title)}</div>
        ${!isIT&&it.title!==title?`<div class="news-title-en">&#127468;&#127463; ${esc(it.title)}</div>`:''}
        ${desc?`<div class="news-desc">${esc(desc)}</div>`:''}
        <div class="news-footer">
          <div class="badge">${isIT?'&#127470;&#127481; Italiano':'&#127760; Tradotto'}</div>
          ${it.link?`<a class="btn-read" href="${esc(it.link)}" target="_blank" rel="noopener">Leggi &rarr;</a>`:''}
        </div>`;
      list.appendChild(el);
    });

  }catch(err){
    document.getElementById('newsList').innerHTML=`
      <div class="error-box">
        <div style="font-size:36px">&#9888;&#65039;</div>
        <div class="error-title">Qualcosa &egrave; andato storto</div>
        <div class="error-msg">${esc(err.message)}</div>
        <button class="btn-primary" onclick="loadNews()" style="margin-top:4px">Riprova</button>
      </div>`;
  }
  loading=false;ri.className='';ri.textContent='↻';
}

function hide(id){document.getElementById(id).classList.add('hidden')}
function show(id){document.getElementById(id).classList.remove('hidden')}

// Auto-refresh ogni 10 minuti
setInterval(()=>{if(!loading)loadNews();},10*60*1000);

init();
</script>
